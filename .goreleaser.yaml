version: 2
project_name: tmux-sidebar

builds:
  - id: tmux-sidebar
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}
    hooks:
      post:
        # Ad-hoc codesign for macOS binaries to pass Gatekeeper (no Apple Developer account needed).
        - cmd: sh -c 'if [ "{{ .Os }}" = "darwin" ]; then codesign --sign - "{{ .Path }}"; fi'

archives:
  - id: tmux-sidebar
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
